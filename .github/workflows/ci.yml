name: CI

on:
  push:
    branches:
      - v1.x
      - ci-test
  pull_request:
    branches:
      - v1.x

defaults:
  run:
    shell: bash

jobs:
  commit-msg:
    name: Commit message check
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: true
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 100
    - name: Check commit messages (PR)
      if: ${{ github.event_name == 'pull_request' }}
      run: |
        git log --oneline > a
        grep -v 7a064ae a > b
        head -n 100 b > c
        tail -n +2 c > commits
        echo "Checking last 100 commits:"
        cat commits
        cut -d ' ' -f2- commits > commit_msgs
        echo ==================
        if grep -q '.\{73\}' commit_msgs; then
          (echo -n "::error::";
           echo "Some commit message summary lines are too long. See CONTRIBUTING.md for more information.";
           echo "Invalid commits:";
           echo;
           grep '.\{73\}' commit_msgs;) | tr '\n' '\001' | sed -e 's#\x01#%0A#g';
          exit 1;
        fi
    - name: Check commit messages (Push)
      if: ${{ github.event_name == 'push' }}
      run: |
        git log --oneline > a
        grep -v 7a064ae a > b
        head -n 100 b > c
        cp c commits
        echo "Checking last 100 commits:"
        cat commits
        cut -d ' ' -f2- commits > commit_msgs
        echo ==================
        if grep -q '.\{73\}' commit_msgs; then
          (echo -n "::error::";
           echo "Some commit message summary lines are too long. See CONTRIBUTING.md for more information.";
           echo "Invalid commits:";
           echo;
           grep -q '.\{73\}' commit_msgs;) | tr '\n' '\001' | sed -e 's#\x01#%0A#g';
          exit 1;
        fi
  clang-format:
    name: Code formatting check
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: true
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Run clang-format
      run: |
        bash ./util/clang_format_all.sh
        git clean -f
    - name: Check formatting
      run: |
        git diff --quiet || (
          (echo -n "::error::";
          echo "clang-format issues were found. See CONTRIBUTING.md for more information.";
          echo;
          git diff;) | tr '\n' '\001' | sed -e 's#\x01#%0A#g';
          exit 1;
        )
    - name: Check commit messages (PR)
      if: ${{ github.event_name == 'pull_request' }}
      run: |
        git log --oneline origin/${{github.base_ref}}.. > a
        echo "Changing individual clang-format commits:"
        cat a
        awk '{print $1}' a > b
        for COMMIT in $(cat b); do
          git checkout $COMMIT
          ./util/clang_format_all.sh --head-commit
          git diff --quiet || (
            (echo -n "::error::";
            echo "commit $COMMIT has clang-format issues. See CONTRIBUTING.md for more information.";
            echo;
            git diff;) | tr '\n' '\001' | sed -e 's#\x01#%0A#g';
            exit 1;
          )
        done
  cmake-minimum:
    name: Baseline cmake check
    needs: [commit-msg, clang-format]
    runs-on: ubuntu-22.04
    env:
      QT_SELECT: qt5
    strategy:
      fail-fast: true
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 5
    - name: Download minimum supported cmake version
      run: |
        pushd /tmp
        wget https://cmake.org/files/v2.8/cmake-2.8.12.2-Linux-i386.tar.gz
        tar -zxvf cmake-2.8.12.2-Linux-i386.tar.gz
        popd
    - name: Install compilation dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-dev mesa-common-dev libgl1-mesa-dev qtbase5-dev libxcb-keysyms1-dev
    - name: Configure renderdoc with cmake
      run: |
        mkdir build
        cd build
        /tmp/cmake-2.8.12.2-Linux-i386/bin/cmake -DCMAKE_BUILD_TYPE=Debug ..
  windows:
    name: Windows
    needs: [commit-msg, clang-format]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        name: [ VS2015 x86 Development, VS2015 x64 Development, VS2015 x64 Release, VS2022 x64 Development, VS2022 x64 Release ]
        include:
          - name: VS2015 x86 Development
            os: windows-2025
            compiler: VS2015
            toolset: v140
            platform: x86
            configuration: Development
          - name: VS2015 x64 Development
            os: windows-2025
            compiler: VS2015
            toolset: v140
            platform: x64
            configuration: Development
          - name: VS2015 x64 Release
            os: windows-2025
            compiler: VS2015
            toolset: v140
            platform: x64
            configuration: Release
          - name: VS2022 x64 Development
            os: windows-2025
            compiler: VS2022
            toolset: v143
            platform: x64
            configuration: Development
          - name: VS2022 x64 Release
            os: windows-2025
            compiler: VS2015
            toolset: v143
            platform: x64
            configuration: Release
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 5

    - name: Install VSSetup
      run: Install-Module VSSetup -Scope CurrentUser
      shell: powershell

    - name: Show installed toolsets
